<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>영수증 분석</title>
<style>
body { font-family: Arial; padding: 20px; max-width: 700px; margin:auto; }
textarea { width:100%; height:200px; }
button { margin-top:10px; padding:10px; }
pre { background:#f4f4f4; padding:10px; margin-top:20px; }
</style>
</head>
<body>

<h2>영수증 텍스트 붙여넣기</h2>

<textarea id="input"></textarea>
<br>
<button onclick="run()">분석</button>

<pre id="result"></pre>

<script>
async function run() {
    const text = document.getElementById("input").value;

    if (!text.trim()) {
        alert("텍스트 넣어라");
        return;
    }

    const res = await fetch("/api/parse", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ text })
    });

    const data = await res.json();

    document.getElementById("result").textContent =
        "매장명: " + data.storeName + "\n" +
        "날짜: " + data.date + "\n" +
        "총액: " + data.totalAmount + "\n\n" +
        "품목:\n" +
        data.items.map(i => "- " + i).join("\n") +
        "\n\n[원문]\n" + data.raw;
}
</script>

</body>
</html>
