<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영수증 OCR 테스트</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 700px;
      margin: 0 auto;
    }
    h2 {
      margin-bottom: 16px;
    }
    input, button {
      margin-top: 10px;
    }
    button {
      padding: 10px 16px;
      cursor: pointer;
    }
    pre {
      margin-top: 20px;
      padding: 12px;
      background: #f4f4f4;
      border: 1px solid #ddd;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 120px;
    }
  </style>
</head>
<body>
  <h2>영수증 OCR 테스트</h2>

  <input type="file" id="fileInput" accept="image/*" />
  <br />
  <button id="runBtn">OCR 실행</button>

  <pre id="result">여기에 결과가 표시됩니다.</pre>

  <script>
    const fileInput = document.getElementById("fileInput");
    const runBtn = document.getElementById("runBtn");
    const result = document.getElementById("result");

    runBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];

      if (!file) {
        alert("영수증 사진을 선택하세요.");
        return;
      }

      result.textContent = "처리 중...";

      try {
        const formData = new FormData();
        formData.append("file", file);

        const response = await fetch("/api/ocr", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          result.textContent =
            "실패\n\n" + JSON.stringify(data, null, 2);
          return;
        }

        result.textContent = data.text || "인식된 텍스트가 없습니다.";
      } catch (error) {
        result.textContent = "오류 발생: " + error.message;
      }
    });
  </script>
</body>
</html>
